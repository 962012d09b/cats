services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./backend
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    ports:
      - "47126:47126"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - ./backend/database:/app/backend/database
      - ./datasets:/app/datasets
    command: cats_backend --production --port 47126 --password da46d0ec15764ea5e9c79f8506f8e97a

  celery-worker:
    build:
      context: ./backend
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - ./backend/database:/app/backend/database
      - ./datasets:/app/datasets
    command: celery -A make_celery worker --loglevel=INFO --concurrency=5

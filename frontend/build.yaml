# Configuration for automated code generation by build_runner using freezed and json_serializable.

targets:
  $default:
    builders:
      source_gen|combining_builder:
        generate_for:
          - lib/models/**.dart
          - lib/providers/**.dart
        options:
          build_extensions:
            'lib/{{path}}/{{file}}.dart': 'lib/{{path}}/generated/{{file}}.g.dart'
      freezed:
        options:
          build_extensions:
            'lib/{{path}}/{{file}}.dart': 'lib/{{path}}/generated/{{file}}.freezed.dart'
          field_rename: snake
          explicit_to_json: true
      json_serializable:
        options:
          field_rename: snake
          explicit_to_json: true